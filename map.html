<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consortium Map — Stone Synergy Soup</title>
<meta name="description" content="Interactive map of the Stone Synergy Soup NJ Consortium pillars: Faith, Mental Health, Workplace, Campus, Film Industry, and A.W.A.R.E.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Georgia', serif;
  background: radial-gradient(ellipse at 30% 20%, #1a0e2e 0%, #0d0d1a 55%, #050508 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.star {
  position: fixed;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.9; }
}

#app {
  position: relative;
  width: 900px;
  height: 900px;
  flex-shrink: 0;
  transform: scale(0.8);
  margin-top: -95px;
}

#svg-lines {
  position: absolute;
  top: 0; left: 0;
  width: 900px; height: 900px;
  z-index: 1;
  pointer-events: none;
}

/* ── Center node ── */
#center {
  position: absolute;
  top: 405px; left: 450px;
  transform: translate(-50%, -50%);
  width: 208px; height: 208px;
  z-index: 10;
  cursor: pointer;
}

.center-bg {
  width: 208px; height: 208px;
  border-radius: 50%;
  background: url('images/stone-soup-nj.png') center 38%/cover no-repeat;
  border: 4px solid #D4A044;
  box-shadow:
    0 0 0 10px rgba(212,160,68,0.08),
    0 0 40px rgba(212,160,68,0.7),
    0 0 90px rgba(212,160,68,0.3);
  animation: centerGlow 3s ease-in-out infinite;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease;
}

#center:hover .center-bg { transform: scale(1.05); }

.center-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(0,0,0,0.08);
  pointer-events: none;
  z-index: 0;
}

@keyframes centerGlow {
  0%, 100% { box-shadow: 0 0 0 10px rgba(212,160,68,0.08), 0 0 40px rgba(212,160,68,0.7), 0 0 90px rgba(212,160,68,0.3); }
  50%       { box-shadow: 0 0 0 14px rgba(212,160,68,0.12), 0 0 60px rgba(212,160,68,1.0), 0 0 130px rgba(212,160,68,0.5); }
}

.steam-wrap {
  position: absolute;
  bottom: 108%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  pointer-events: none;
}

.steam-wisp {
  border-radius: 4px;
  background: rgba(210,210,255,0.45);
  filter: blur(3px);
  animation: steamUp 2.8s ease-out infinite;
}
.steam-wisp:nth-child(1) { width: 7px; height: 34px; animation-delay: 0s; }
.steam-wisp:nth-child(2) { width: 5px; height: 22px; animation-delay: 0.55s; }
.steam-wisp:nth-child(3) { width: 6px; height: 28px; animation-delay: 1.1s; }

@keyframes steamUp {
  0%   { opacity: 0; transform: translateY(0) scaleX(1); }
  20%  { opacity: 0.75; }
  100% { opacity: 0; transform: translateY(-60px) scaleX(2.8); }
}

.center-hint-bar {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.58);
  color: rgba(255,255,255,0.65);
  font-size: 7.5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 10px;
  white-space: nowrap;
  z-index: 2;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* ── Pillars ── */
.pillar {
  position: absolute;
  width: 143px; height: 143px;
  transform: translate(-50%, -50%);
  z-index: 5;
  cursor: pointer;
}

.pillar-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 14px;
  border: 3px solid rgba(255,255,255,0.3);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.pillar-inner::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0);
  transition: background 0.3s;
}

.pillar:hover .pillar-inner,
.pillar.active .pillar-inner {
  transform: scale(1.1);
  border-color: rgba(255,255,255,0.75);
}

.pillar:hover .pillar-inner::before,
.pillar.active .pillar-inner::before {
  background: rgba(255,255,255,0.07);
}

.pillar.active .pillar-inner {
  transform: scale(1.13);
}

.p-icon {
  font-size: 32px;
  line-height: 1;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
}

.p-label {
  color: #fff;
  font-size: 9px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.35;
  margin-top: 6px;
  text-shadow: 0 1px 5px rgba(0,0,0,0.95);
  position: relative;
  z-index: 1;
}

/* ── Detail panel (right) ── */
#panel {
  position: fixed;
  right: -440px;
  top: 50%;
  transform: translateY(-50%);
  width: 410px;
  max-height: 88vh;
  background: rgba(6,6,18,0.97);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  padding: 30px;
  z-index: 200;
  overflow-y: auto;
  transition: right 0.45s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: -10px 0 60px rgba(0,0,0,0.7);
}
#panel.open { right: 22px; }

.panel-close {
  position: absolute;
  top: 18px; right: 18px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.panel-close:hover { background: rgba(255,255,255,0.22); }

.panel-top {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.09);
  margin-bottom: 20px;
}

.panel-big-icon { font-size: 44px; line-height: 1; }

.panel-title-wrap { flex: 1; }
.panel-title {
  color: #fff;
  font-size: 17px;
  font-weight: bold;
  line-height: 1.35;
}
.panel-bar {
  height: 3px;
  width: 48px;
  border-radius: 2px;
  margin-top: 10px;
}

.panel-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.panel-list li {
  display: flex;
  gap: 11px;
  align-items: flex-start;
  color: rgba(255,255,255,0.82);
  font-size: 13.5px;
  line-height: 1.65;
}
.p-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 7px;
}

.panel-links {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.links-heading {
  color: rgba(255,255,255,0.35);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.panel-link {
  color: rgba(140,180,255,0.85);
  font-size: 12px;
  text-decoration: none;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.panel-link:hover {
  color: rgba(180,210,255,1);
  text-decoration: underline;
}

/* ── All Pillars panel (left) ── */
#all-panel {
  position: fixed;
  right: 22px;
  top: 50%;
  transform: translateY(-50%) translateX(calc(100% + 22px));
  width: 375px;
  max-height: 90vh;
  background: rgba(6,6,18,0.97);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  padding: 26px;
  z-index: 200;
  overflow-y: auto;
  transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
  box-shadow: -10px 0 60px rgba(0,0,0,0.7);
}
#all-panel.open {
  transform: translateY(-50%) translateX(0);
}

.all-heading {
  color: #D4A044;
  font-size: 13px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding-bottom: 16px;
  margin-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.09);
  font-family: 'Segoe UI', system-ui, sans-serif;
}

.all-close {
  position: absolute;
  top: 18px; right: 18px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.all-close:hover { background: rgba(255,255,255,0.22); }

.all-item {
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.all-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.all-item-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 9px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.all-item-header:hover { opacity: 0.8; }
.all-item-icon { font-size: 22px; }
.all-item-title {
  color: #fff;
  font-size: 11.5px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.35;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

.all-bullets {
  list-style: none;
  padding-left: 32px;
}
.all-bullets li {
  color: rgba(255,255,255,0.62);
  font-size: 11px;
  line-height: 1.65;
  margin-bottom: 3px;
  position: relative;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.all-bullets li::before {
  content: '•';
  position: absolute;
  left: -14px;
}
.all-link {
  display: block;
  margin-top: 7px;
  padding-left: 32px;
  color: rgba(140,180,255,0.75);
  font-size: 11px;
  text-decoration: none;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.all-link:hover { color: rgba(180,210,255,1); text-decoration: underline; }

/* ── Bottom button ── */
#btn-all {
  position: fixed;
  bottom: 22px;
  right: 22px;
  transform: none;
  padding: 12px 30px;
  background: linear-gradient(135deg, #6b2e0a 0%, #c4882a 50%, #D4A044 100%);
  color: #fff;
  border: none;
  border-radius: 30px;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  z-index: 300;
  box-shadow: 0 4px 28px rgba(212,160,68,0.5);
  transition: all 0.3s;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
#btn-all:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 44px rgba(212,160,68,0.75);
}

/* ── Header ── */
#header {
  position: fixed;
  top: 20px; left: 22px;
  transform: none;
  text-align: left;
  z-index: 20;
  pointer-events: none;
}
#header h1 {
  font-size: 21px;
  color: #D4A044;
  letter-spacing: 4px;
  text-transform: uppercase;
  text-shadow: 0 0 30px rgba(212,160,68,0.65);
}
#header p {
  color: rgba(255,255,255,0.38);
  font-size: 11px;
  letter-spacing: 2px;
  margin-top: 5px;
  font-family: 'Segoe UI', system-ui, sans-serif;
}


/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 3px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <h1>Stone Synergy Soup</h1>
</div>

<div id="app">
  <svg id="svg-lines" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  </svg>

  <div id="center">
    <div class="center-bg">
      <div class="steam-wrap">
        <div class="steam-wisp"></div>
        <div class="steam-wisp"></div>
        <div class="steam-wisp"></div>
      </div>
      <div class="center-hint-bar">Click to animate all</div>
    </div>
  </div>
</div>

<!-- Right detail panel -->
<div id="panel">
  <button class="panel-close" id="panel-close-btn">&#x2715;</button>
  <div class="panel-top">
    <div class="panel-big-icon" id="panel-icon"></div>
    <div class="panel-title-wrap">
      <div class="panel-title" id="panel-title"></div>
      <div class="panel-bar" id="panel-bar"></div>
    </div>
  </div>
  <ul class="panel-list" id="panel-list"></ul>
  <div class="panel-links" id="panel-links" style="display:none"></div>
</div>

<!-- Left all-pillars panel -->
<div id="all-panel">
  <button class="all-close" id="all-close-btn">&#x2715;</button>
  <div class="all-heading">&#x1F372; All Pillars</div>
  <div id="all-content"></div>
</div>

<button id="btn-all">&#9776; View All Pillars</button>

<script>
var PILLARS = [
  {
    id: 'aware',
    label: 'NJ A.W.A.R.E. → NJ Consortium',
    icon: '🎯',
    color: '#3B82F6',
    glowColor: 'rgba(59,130,246,0.65)',
    angle: -90,
    bullets: [
      'Bridging NJ A.W.A.R.E. (Awareness, Wellness, Advocacy, Recovery & Education) into the broader NJ Consortium framework',
      'Peer-led recovery ecosystem connecting individuals with lived experience to community care networks',
      'Building a regional coalition that amplifies mental health awareness and advocacy across New Jersey',
    ],
    links: []
  },
  {
    id: 'fac',
    label: 'NJ Faith Action Center (FAC)',
    icon: '🕊️',
    color: '#8B5CF6',
    glowColor: 'rgba(139,92,246,0.65)',
    angle: -30,
    bullets: [
      'Connecting chaplains & clergy with first responders and behavioral health professionals in the community',
      'Placing lived experiencers at the center of faith-based outreach and care',
      'Synergy with NJ A.W.A.R.E., We Are Monmouth & NAMI FaithNet — Pathways to Hope',
      'Training faith communities as trusted frontline mental health connectors',
    ],
    links: [
      { text: 'NAMI FaithNet — Pathways to Hope', url: 'https://www.nami.org/community-and-culture/nami-faithnet/pathways-to-hope/' }
    ]
  },
  {
    id: 'mentalhealth',
    label: 'NJ Mental Health',
    icon: '🧠',
    color: '#10B981',
    glowColor: 'rgba(16,185,129,0.65)',
    angle: 30,
    bullets: [
      'Expanding applications of the SAMHSA Wellness Wheel across NJ communities',
      'Centering the SPIRITUAL dimension as a core component of whole-person mental wellness',
      'Training practitioners on DSM Z65.8 — Moral, Religious or Spiritual Problem',
      'Programming grounded in Creating A Healthier Life: A Step-by-Step Guide to Wellness (SAMHSA)',
    ],
    links: [
      { text: 'SAMHSA Wellness Guide (PDF)', url: 'https://library.samhsa.gov/sites/default/files/sma16-4958.pdf' }
    ]
  },
  {
    id: 'workplace',
    label: 'Workplace Mental Health',
    icon: '💼',
    color: '#F59E0B',
    glowColor: 'rgba(245,158,11,0.65)',
    angle: 90,
    bullets: [
      'Expanding on The Employee Mental Health Business Imperative (ROI-NJ Op-Ed)',
      'Integrating latest research from NJ BIZ, McKinsey, Mental Health America & NAMI',
      'Making the ROI case: return on mental health investment for NJ employers',
      'Connecting workplace wellness programs with faith and community support ecosystems',
    ],
    links: [
      { text: 'Employee Mental Health Business Imperative — ROI-NJ', url: 'https://www.roi-nj.com/2025/07/10/opinion/op-ed/the-employee-mental-health-business-imperative-op-ed/' }
    ]
  },
  {
    id: 'campus',
    label: 'College & University Campus',
    icon: '🎭',
    color: '#06B6D4',
    glowColor: 'rgba(6,182,212,0.65)',
    angle: 150,
    bullets: [
      'Advancing student mental health through theater, media & the creative arts',
      'Strategic synergy with NJ Film Academy for arts-as-healing programming',
      'Embedding creative mental health modalities into campus culture and curriculum',
      'Student entrepreneurship opportunities in mental health media and content production',
    ],
    links: []
  },
  {
    id: 'film',
    label: 'NJ Film Industry',
    icon: '🎬',
    color: '#EF4444',
    glowColor: 'rgba(239,68,68,0.65)',
    angle: 210,
    bullets: [
      'Collaboration with NJEDA & NJ Motion Picture & Television Commission',
      'Expanding NJ Take 2 Upcycling Program through Filmanthropy by Design',
      'Creating entrepreneurial pathways for college students in film & media production',
      'Faith-based film market at an unprecedented boom in 2026 — higher production values & broader audiences',
      'Launching Civil Rights MOVIEment for the Soul™ — media platform interconnecting faith & mental health, produced in New Jersey',
    ],
    links: [
      { text: 'NJ Take 2 Upcycling Program', url: 'https://www.nj.gov/njfilm/nj-take-2.shtml' }
    ]
  }
];

var CX = 450, CY = 405, ORBIT = 295, CTR_R = 104, PLR_R = 72;

PILLARS.forEach(function(p) {
  var r = p.angle * Math.PI / 180;
  p.x = CX + ORBIT * Math.cos(r);
  p.y = CY + ORBIT * Math.sin(r);
});

function drawLines() {
  var svg = document.getElementById('svg-lines');
  PILLARS.forEach(function(p) {
    var dx = p.x - CX, dy = p.y - CY;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var ux = dx/dist, uy = dy/dist;
    var x1 = CX + ux * CTR_R, y1 = CY + uy * CTR_R;
    var x2 = p.x - ux * PLR_R, y2 = p.y - uy * PLR_R;

    var glow = makeLine(x1, y1, x2, y2, p.color, 8, 0.18);
    glow.setAttribute('filter', 'url(#soft-glow)');
    glow.dataset.pid = p.id;
    glow.dataset.role = 'glow';
    svg.appendChild(glow);

    var line = makeLine(x1, y1, x2, y2, p.color, 2, 0.5);
    line.setAttribute('stroke-dasharray', '7 5');
    line.dataset.pid = p.id;
    line.dataset.role = 'line';
    svg.appendChild(line);

    var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('r', '4.5');
    dot.setAttribute('fill', p.color);
    dot.setAttribute('opacity', '0.85');
    var mo = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
    mo.setAttribute('dur', (2.2 + PILLARS.indexOf(p) * 0.28) + 's');
    mo.setAttribute('repeatCount', 'indefinite');
    mo.setAttribute('path', 'M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2);
    dot.appendChild(mo);
    svg.appendChild(dot);
  });
}

function makeLine(x1, y1, x2, y2, stroke, width, opacity) {
  var el = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  el.setAttribute('x1', x1); el.setAttribute('y1', y1);
  el.setAttribute('x2', x2); el.setAttribute('y2', y2);
  el.setAttribute('stroke', stroke);
  el.setAttribute('stroke-width', width);
  el.setAttribute('stroke-opacity', opacity);
  return el;
}

function setLineHighlight(id, on) {
  document.querySelectorAll('[data-pid="' + id + '"]').forEach(function(el) {
    var isGlow = el.dataset.role === 'glow';
    if (on) {
      el.setAttribute('stroke-width', isGlow ? 14 : 3);
      el.setAttribute('stroke-opacity', isGlow ? 0.4 : 0.9);
    } else {
      el.setAttribute('stroke-width', isGlow ? 8 : 2);
      el.setAttribute('stroke-opacity', isGlow ? 0.18 : 0.5);
    }
  });
}

function renderPillars() {
  var app = document.getElementById('app');
  PILLARS.forEach(function(p) {
    var el = document.createElement('div');
    el.className = 'pillar';
    el.id = 'pillar-' + p.id;
    el.style.left = p.x + 'px';
    el.style.top  = p.y + 'px';

    var inner = document.createElement('div');
    inner.className = 'pillar-inner';
    inner.style.background = 'radial-gradient(circle at 38% 32%, ' + p.color + 'dd 0%, ' + p.color + '99 45%, ' + p.color + '44 100%)';
    inner.style.boxShadow = '0 0 22px ' + p.glowColor + ', 0 0 50px ' + p.glowColor.replace('0.65','0.2');
    inner.innerHTML = '<div class="p-icon">' + p.icon + '</div><div class="p-label">' + p.label + '</div>';

    el.appendChild(inner);
    el.addEventListener('click', function() { openPanel(p); });
    el.addEventListener('mouseenter', function() { setLineHighlight(p.id, true); });
    el.addEventListener('mouseleave', function() { setLineHighlight(p.id, false); });
    app.appendChild(el);
  });
}

var currentId = null;

function openPanel(p) {
  currentId = p.id;
  document.querySelectorAll('.pillar').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('pillar-' + p.id).classList.add('active');

  document.getElementById('panel-icon').textContent = p.icon;
  document.getElementById('panel-title').textContent = p.label;
  document.getElementById('panel-bar').style.background = p.color;

  var list = document.getElementById('panel-list');
  list.innerHTML = p.bullets.map(function(b) {
    return '<li><div class="p-dot" style="background:' + p.color + '"></div><span>' + b + '</span></li>';
  }).join('');

  var linksEl = document.getElementById('panel-links');
  if (p.links && p.links.length) {
    linksEl.style.display = 'flex';
    linksEl.innerHTML = '<div class="links-heading">Resources</div>' +
      p.links.map(function(l) {
        return '<a class="panel-link" href="' + l.url + '" target="_blank" rel="noopener">&#8599; ' + l.text + '</a>';
      }).join('');
  } else {
    linksEl.style.display = 'none';
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.pillar').forEach(function(el) { el.classList.remove('active'); });
  currentId = null;
}

document.getElementById('center').addEventListener('click', function() {
  closePanel();
  PILLARS.forEach(function(p, i) {
    setTimeout(function() {
      var el = document.getElementById('pillar-' + p.id);
      el.classList.add('active');
      setLineHighlight(p.id, true);
      setTimeout(function() {
        el.classList.remove('active');
        setLineHighlight(p.id, false);
      }, 600);
    }, i * 100);
  });
});

var allOpen = false;

function buildAllContent() {
  var wrap = document.getElementById('all-content');
  if (wrap.innerHTML) return;
  wrap.innerHTML = PILLARS.map(function(p) {
    var bulletHtml = p.bullets.map(function(b) {
      return '<li>' + b + '</li>';
    }).join('');
    var linkHtml = p.links.map(function(l) {
      return '<a class="all-link" href="' + l.url + '" target="_blank" rel="noopener">&#8599; ' + l.text + '</a>';
    }).join('');
    return (
      '<div class="all-item">' +
        '<div class="all-item-header" data-open="' + p.id + '">' +
          '<span class="all-item-icon">' + p.icon + '</span>' +
          '<span class="all-item-title" style="color:' + p.color + '">' + p.label + '</span>' +
        '</div>' +
        '<ul class="all-bullets">' + bulletHtml + '</ul>' +
        linkHtml +
      '</div>'
    );
  }).join('');

  (function() {
    var s = document.createElement('style');
    PILLARS.forEach(function(p, i) {
      s.textContent += '#all-content .all-item:nth-child(' + (i+1) + ') .all-bullets li::before { color: ' + p.color + '; }\n';
    });
    document.head.appendChild(s);
  })();

  document.querySelectorAll('[data-open]').forEach(function(el) {
    el.addEventListener('click', function() {
      var id = el.dataset.open;
      var p = PILLARS.find(function(x) { return x.id === id; });
      if (p) openPanel(p);
    });
  });
}

function toggleAll() {
  allOpen = !allOpen;
  var btn = document.getElementById('btn-all');
  var panel = document.getElementById('all-panel');
  if (allOpen) {
    buildAllContent();
    panel.classList.add('open');
    btn.style.visibility = 'hidden';
  } else {
    panel.classList.remove('open');
    btn.style.visibility = 'visible';
  }
}

(function createStars() {
  for (var i = 0; i < 90; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = Math.random() * 1.8 + 0.4;
    s.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;top:' + (Math.random()*100) + '%;left:' + (Math.random()*100) + '%;animation-delay:' + (Math.random()*4) + 's;animation-duration:' + (2+Math.random()*3) + 's;';
    document.body.appendChild(s);
  }
})();

document.getElementById('panel-close-btn').addEventListener('click', closePanel);
document.getElementById('all-close-btn').addEventListener('click', toggleAll);
document.getElementById('btn-all').addEventListener('click', toggleAll);

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('panel').classList.contains('open')) {
      closePanel();
    } else if (allOpen) {
      toggleAll();
    }
  }
});

drawLines();
renderPillars();
</script>
</body>
</html>
